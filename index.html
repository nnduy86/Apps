<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng Giá Xe Dịch Vụ Pro - Neon</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ea; --neon-green: #39ff14; --neon-yellow: #fffb00; --dark-bg: #0a0a0a; --panel-bg: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--dark-bg); color: #fff; padding: 15px; padding-bottom: 80px; }
        h1 { text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 20px; font-size: 1.5rem; text-transform: uppercase; }
        
        .card { background: var(--panel-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .card-title { color: var(--neon-pink); font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px dashed #555; padding-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; margin-top: 10px; }
        .input-group { position: relative; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(0, 243, 255, 0.4); }
        
        /* Hộp gợi ý địa điểm */
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #222; border: 1px solid var(--neon-blue); border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .suggestion-item { padding: 12px 10px; border-bottom: 1px solid #444; font-size: 0.95rem; cursor: pointer; color: #ddd; }
        .suggestion-item:hover, .suggestion-item:active { background: var(--neon-blue); color: #000; }

        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        .btn-action { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; text-shadow: 0 0 5px var(--neon-green); text-transform: uppercase; }
        .btn-action:active { background: var(--neon-green); color: #000; }
        .btn-goong { border-color: var(--neon-yellow); color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }
        .btn-goong:active { background: var(--neon-yellow); color: #000; }
        .btn-quote { background: linear-gradient(45deg, #ff00ea, #4a00e0); border: none; color: white; font-size: 1.1rem; box-shadow: 0 0 15px rgba(255, 0, 234, 0.5); }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .check-item { background: #222; padding: 8px 12px; border-radius: 20px; border: 1px solid #444; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .check-item input { accent-color: var(--neon-pink); }

        #result-box { display: none; background: linear-gradient(145deg, #1a0014, #00121a); border: 2px solid var(--neon-blue); border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); margin-top: 20px; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .total-price { font-size: 2.2rem; font-weight: bold; color: var(--neon-green); text-align: center; text-shadow: 0 0 15px var(--neon-green); margin: 10px 0; }
        .breakdown { font-size: 0.85rem; color: #ccc; line-height: 1.6; border-top: 1px solid #444; padding-top: 10px; }
        .highlight { color: var(--neon-blue); font-weight: bold; }
        
        #loading { display: none; text-align: center; color: var(--neon-yellow); font-size: 0.9rem; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <h1>Báo Giá Xe Dịch Vụ</h1>

    <div class="card">
        <div class="card-title">1. LỘ TRÌNH & ĐỊA ĐIỂM</div>
        
        <label>Điểm Đón:</label>
        <div class="input-group">
            <input type="text" id="startLoc" placeholder="Nhập địa chỉ đón..." oninput="getSuggestions('startLoc', 'startSug')" onfocus="getSuggestions('startLoc', 'startSug')" autocomplete="off">
            <div id="startSug" class="suggestions"></div>
        </div>

        <label>Điểm Đến:</label>
        <div class="input-group">
            <input type="text" id="endLoc" placeholder="Nhập địa chỉ đến..." oninput="getSuggestions('endLoc', 'endSug')" onfocus="getSuggestions('endLoc', 'endSug')" autocomplete="off">
            <div id="endSug" class="suggestions"></div>
        </div>
        
        <button class="btn-action btn-goong" onclick="autoCalculateDistance()">🗺️ Tự Động Đo Khoảng Cách</button>
        <div id="loading">Đang tính toán tuyến đường...</div>

        <div class="row" style="margin-top: 15px;">
            <div class="col">
                <label>Khoảng Cách (KM):</label>
                <input type="number" id="distance" placeholder="Số KM">
            </div>
            <div class="col">
                <label>Loại Chuyến:</label>
                <select id="tripType">
                    <option value="1">1 Chiều</option>
                    <option value="1.5">2 Chiều (Trong buổi)</option>
                    <option value="1.8">2 Chiều (Cả ngày)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">2. LOẠI XE & MỨC GIÁ</div>
        <div class="row">
            <div class="col">
                <label>Loại Xe:</label>
                <select id="carType">
                    <option value="4" data-fuel="6">4 Chỗ (6L/100km)</option>
                    <option value="7" data-fuel="8">7 Chỗ (8L/100km)</option>
                    <option value="16" data-fuel="11">16 Chỗ (11L/100km)</option>
                </select>
            </div>
            <div class="col">
                <label>Mức Giá/KM:</label>
                <select id="serviceType">
                    <option value="13000">Grab/Be (13k)</option>
                    <option value="15000">Taxi (15k)</option>
                    <option value="11000">Xe Dù (11k)</option>
                </select>
            </div>
        </div>
        <label>Giá Xăng/Dầu (VNĐ/Lít):</label>
        <input type="number" id="fuelPrice" value="24000">
    </div>

    <div class="card">
        <div class="card-title">3. PHỤ PHÍ LỘ TRÌNH</div>
        <label>Phí Cầu Đường / Cao Tốc:</label>
        <select id="tollSelect" onchange="toggleManual('tollSelect', 'manualToll')">
            <option value="0">Không đi qua trạm thu phí</option>
            <option value="39000">Cao tốc Long Thành (39k)</option>
            <option value="98000">Cao tốc LT - Dầu Giây (98k)</option>
            <option value="103000">Cao tốc Trung Lương (103k)</option>
            <option value="custom">🚧 Tự nhập số tiền...</option>
        </select>
        <input type="number" id="manualToll" style="display:none; margin-top:5px;" placeholder="Nhập tiền vé ETC..." value="0">

        <label>Vé Phà / Qua đò:</label>
        <select id="ferrySelect" onchange="toggleManual('ferrySelect', 'manualFerry')">
            <option value="0">Không đi phà</option>
            <option value="12000">Phà Cát Lái (12k)</option>
            <option value="25000">Phà Bình Khánh (25k)</option>
            <option value="custom">⛴️ Tự nhập số tiền...</option>
        </select>
        <input type="number" id="manualFerry" style="display:none; margin-top:5px;" placeholder="Nhập tiền vé phà..." value="0">

        <div class="checkbox-group">
            <label class="check-item"><input type="checkbox" id="feePark" value="20000"> Sân bay/Bến bãi (20k)</label>
            <label class="check-item"><input type="checkbox" id="feeNight" value="300000"> Lưu đêm (300k/đêm)</label>
        </div>
        <label style="margin-top:10px;">Số ngày đi (Đi tỉnh):</label>
        <input type="number" id="days" value="1" min="1">
    </div>

    <button class="btn-action btn-quote" onclick="showQuote()">💰 TÍNH TIỀN & XUẤT BÁO GIÁ</button>

    <div id="result-box">
        <div style="text-align:center; color:#fff; letter-spacing: 2px;">TỔNG TIỀN BÁO KHÁCH</div>
        <div class="total-price" id="displayTotal">0 VNĐ</div>
        
        <div class="breakdown">
            <div>Dự toán chi phí (Chủ xe):</div>
            <div>- Tiền Xăng: <span class="highlight" id="costFuel">0đ</span></div>
            <div>- Lương Tài Xế: <span class="highlight" id="costDriver">0đ</span></div>
            <div>- Tổng Phụ phí: <span class="highlight" id="costFees">0đ</span></div>
            <div style="border-top: 1px dashed #555; margin-top:5px; padding-top:5px; color: var(--neon-pink);">
                THỰC LÃNH MANG VỀ: <strong style="font-size:1.1rem;" id="netProfit">0đ</strong>
            </div>
        </div>
        <button class="btn-action" style="padding: 8px; font-size: 0.9rem; margin-top: 15px;" onclick="document.getElementById('result-box').style.display='none'">Đóng Báo Giá</button>
    </div>

    <script>
        const GOONG_API_KEY = "20EqreM05diMJrpTrzot0VLzKOcrgwFq81rApwxw";

        // 1. HÀM TẠO ĐỀ XUẤT (GHIM VỊ TRÍ HIỆN TẠI LÊN ĐẦU)
        let debounceTimer;
        async function getSuggestions(inputId, sugBoxId) {
            clearTimeout(debounceTimer);
            let inputEl = document.getElementById(inputId);
            let val = inputEl.value;
            let sugBox = document.getElementById(sugBoxId);
            
            // Xóa tọa độ ngầm nếu người dùng gõ thay đổi text
            inputEl.removeAttribute('data-coords');

            // Xây dựng nút "Vị trí hiện tại" cho ô Điểm Đón
            let pinnedItem = '';
            if (inputId === 'startLoc') {
                pinnedItem = `<div class="suggestion-item" style="color: var(--neon-green); font-weight: bold; border-bottom: 2px solid #444;" onclick="selectCurrentLocation()">
                                📍 Chọn vị trí hiện tại
                              </div>`;
            }

            // Nếu người dùng chưa gõ hoặc gõ ít hơn 2 ký tự
            if(val.length < 2) { 
                if (pinnedItem) {
                    sugBox.innerHTML = pinnedItem;
                    sugBox.style.display = 'block';
                } else {
                    sugBox.style.display = 'none'; 
                }
                return; 
            }

            // Gọi API Goong khi người dùng gõ
            debounceTimer = setTimeout(async () => {
                try {
                    let res = await fetch(`https://rsapi.goong.io/Place/AutoComplete?input=${encodeURIComponent(val)}&api_key=${GOONG_API_KEY}`);
                    let data = await res.json();
                    
                    sugBox.innerHTML = pinnedItem; // Chèn nút ghim vào đầu
                    
                    if(data.predictions && data.predictions.length > 0) {
                        data.predictions.forEach(item => {
                            let div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.innerText = item.description;
                            div.onclick = function() {
                                inputEl.value = item.description;
                                sugBox.style.display = 'none';
                            };
                            sugBox.appendChild(div);
                        });
                    }
                    sugBox.style.display = 'block';
                } catch(e) {}
            }, 300);
        }

        // Ẩn bảng gợi ý khi bấm ra ngoài
        document.addEventListener('click', function(e) {
            if(!e.target.closest('.input-group')) {
                document.getElementById('startSug').style.display = 'none';
                document.getElementById('endSug').style.display = 'none';
            }
        });

        // 2. XỬ LÝ KHI BẤM "CHỌN VỊ TRÍ HIỆN TẠI"
        function selectCurrentLocation() {
            let startInput = document.getElementById('startLoc');
            let sugBox = document.getElementById('startSug');
            
            sugBox.style.display = 'none';
            startInput.value = "📍 Vị trí hiện tại (Đang lấy...)"; 
            
            if (!navigator.geolocation) {
                alert("Thiết bị không hỗ trợ định vị!");
                startInput.value = "";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Hiện chữ trên giao diện
                    startInput.value = "📍 Vị trí hiện tại"; 
                    
                    // Lưu tọa độ thật vào thuộc tính ẩn để đo khoảng cách
                    startInput.setAttribute('data-coords', `${lat},${lng}`); 
                },
                (error) => {
                    alert("Không thể lấy vị trí. Vui lòng cấp quyền GPS cho ứng dụng!");
                    startInput.value = "";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function toggleManual(selectId, inputId) {
            let val = document.getElementById(selectId).value;
            document.getElementById(inputId).style.display = (val === 'custom') ? 'block' : 'none';
        }

        // 3. TỰ ĐỘNG ĐO KHOẢNG CÁCH (XÀI TỌA ĐỘ ẨN NẾU CÓ)
        async function autoCalculateDistance() {
            const startInput = document.getElementById('startLoc');
            const endInput = document.getElementById('endLoc');
            
            const startStr = startInput.value;
            const endStr = endInput.value;

            if(!startStr || !endStr) return alert("Vui lòng nhập Điểm Đón và Điểm Đến!");
            document.getElementById('loading').style.display = 'block';

            try {
                // Hàm con: Ưu tiên lấy tọa độ ẩn, nếu không có mới đem text đi dịch
                async function getCoords(address, inputElement) {
                    if (inputElement.hasAttribute('data-coords')) {
                        return inputElement.getAttribute('data-coords');
                    }
                    
                    if(address.includes(',') && !address.match(/[a-zA-Z]/)) return address; 
                    
                    let res = await fetch(`https://rsapi.goong.io/geocode?address=${encodeURIComponent(address)}&api_key=${GOONG_API_KEY}`);
                    let data = await res.json();
                    if(data.results && data.results.length > 0) return `${data.results[0].geometry.location.lat},${data.results[0].geometry.location.lng}`;
                    else throw new Error(`Không tìm thấy: ${address}`);
                }

                let originCoords = await getCoords(startStr, startInput);
                let destCoords = await getCoords(endStr, endInput);

                let routeRes = await fetch(`https://rsapi.goong.io/Direction?origin=${originCoords}&destination=${destCoords}&vehicle=car&api_key=${GOONG_API_KEY}`);
                let routeData = await routeRes.json();

                if(routeData.routes && routeData.routes.length > 0) {
                    let distanceKm = (routeData.routes[0].legs[0].distance.value / 1000).toFixed(1);
                    document.getElementById('distance').value = distanceKm;
                    document.getElementById('loading').style.display = 'none';
                } else throw new Error("Không thể vẽ đường!");

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert("Lỗi tính quãng đường: " + error.message);
            }
        }

        // 4. TÍNH BÁO GIÁ (GIỮ NGUYÊN CODE CŨ CỦA BẠN)
        function showQuote() {
            let distance = parseFloat(document.getElementById('distance').value);
            if(!distance || distance <= 0) { alert("Vui lòng nhập hoặc đo khoảng cách (KM) trước khi báo giá!"); return; }

            let tripMultiplier = parseFloat(document.getElementById('tripType').value);
            let servicePrice = parseFloat(document.getElementById('serviceType').value);
            let days = parseInt(document.getElementById('days').value) || 1;
            let fuelPrice = parseFloat(document.getElementById('fuelPrice').value) || 0;
            
            let carSelect = document.getElementById('carType');
            let fuelConsumption = parseFloat(carSelect.options[carSelect.selectedIndex].getAttribute('data-fuel'));

            let tollFee = document.getElementById('tollSelect').value === 'custom' ? parseFloat(document.getElementById('manualToll').value) || 0 : parseFloat(document.getElementById('tollSelect').value) || 0;
            let ferryFee = document.getElementById('ferrySelect').value === 'custom' ? parseFloat(document.getElementById('manualFerry').value) || 0 : parseFloat(document.getElementById('ferrySelect').value) || 0;

            let totalTollAndFerry = (tollFee + ferryFee) * ((tripMultiplier >= 1.5) ? 2 : 1);

            let otherFees = 0;
            if(document.getElementById('feePark').checked) otherFees += parseFloat(document.getElementById('feePark').value);
            if(document.getElementById('feeNight').checked) otherFees += parseFloat(document.getElementById('feeNight').value) * (days > 1 ? days - 1 : 1);

            let totalFees = totalTollAndFerry + otherFees;

            let grossTotal = (distance * tripMultiplier * servicePrice) + totalFees;
            let fuelCost = (distance * tripMultiplier / 100) * fuelConsumption * fuelPrice;
            let driverWage = days > 1 ? 500000 * days : (tripMultiplier > 1.2 ? 500000 : 300000);

            let netProfit = grossTotal - fuelCost - driverWage - totalFees;

            document.getElementById('displayTotal').innerText = grossTotal.toLocaleString('vi-VN') + " đ";
            document.getElementById('costFuel').innerText = fuelCost.toLocaleString('vi-VN') + " đ";
            document.getElementById('costDriver').innerText = driverWage.toLocaleString('vi-VN') + " đ";
            document.getElementById('costFees').innerText = totalFees.toLocaleString('vi-VN') + " đ";
            document.getElementById('netProfit').innerText = netProfit.toLocaleString('vi-VN') + " đ";

            let resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            setTimeout(() => { resultBox.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
        }
    </script>
</body>
</html>
